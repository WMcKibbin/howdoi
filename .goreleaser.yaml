version: 2

project_name: howdoi

builds:
  - main: .
    binary: howdoi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/WMcKibbin/howdoi/internal/version.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - repository:
      owner: WMcKibbin
      name: homebrew-tap
    homepage: https://github.com/WMcKibbin/howdoi
    description: AI-powered command-line assistant

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
